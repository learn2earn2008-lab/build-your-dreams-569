# Security scan gate for pull requests and pushes to main.
#
# What this enforces in CI:
#   - A dependency vulnerability audit (npm audit) against the committed
#     lockfile. The job fails the PR if any HIGH or CRITICAL advisory is found,
#     matching the severity bar Lovable's dependency scanner uses.
#   - A secret scan (TruffleHog) that fails the build if any verified leaked
#     credentials are detected in the repository or in the PR diff.
#   - A static analysis scan (CodeQK) that detects security vulnerabilities in
#     JavaScript/TypeScript code and blocks the PR on new findings.
#
# What CANNOT run here:
#   - Lovable's backend/RLS security scanner and the Supabase database linter
#     are part of the Lovable platform, not a standalone CLI, so they run inside
#     Lovable (Security tab) rather than in GitHub Actions. Keep using the
#     in-product scan for database/RLS coverage.
#
# To tighten the gate to "zero findings at ANY severity", change
# `--audit-level=high` to `--audit-level=low` in the audit step.

name: Security Scan

on:
  pull_request:
  push:
    branches: [main]

# Prevent redundant runs on rapid pushes to the same PR/branch.
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (from lockfile)
        run: npm ci

      # Fails the job (non-zero exit) when any high/critical advisory is present,
      # blocking the PR until dependencies are upgraded.
      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # For PRs, scan only the commits introduced by the branch. For pushes
          # to main, scan the entire repository history.
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
          output: codeql-results

      - name: Upload CodeQL SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codeql-sarif-${{ github.run_id }}-${{ github.run_attempt }}
          path: codeql-results/
          if-no-files-found: ignore
